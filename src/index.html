<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notepad Pro</title>
  <link rel="stylesheet" href="styles/themes.css">
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/editor.css">
  <link rel="stylesheet" href="styles/sidebar.css">
  <link rel="stylesheet" href="styles/tasks.css">
  <link rel="stylesheet" href="styles/leads.css">
  <link rel="stylesheet" href="styles/customers.css">
  <link rel="stylesheet" href="styles/reminders.css">
  <link rel="stylesheet" href="styles/meetings.css">
  <link rel="stylesheet" href="styles/dashboard.css">
  <link rel="stylesheet" href="styles/notes-ui.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
  <!-- ═══ TITLEBAR ═══ -->
  <header id="titlebar">
    <div class="titlebar-drag">
      <div class="titlebar-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
      </div>
      <span class="titlebar-title">Notepad Pro</span>
    </div>
    <div class="titlebar-controls">
      <button id="btn-minimize" class="titlebar-btn" onclick="window.api.minimize()">
        <svg width="12" height="12" viewBox="0 0 12 12"><line x1="2" y1="6" x2="10" y2="6" stroke="currentColor" stroke-width="1.5"/></svg>
      </button>
      <button id="btn-maximize" class="titlebar-btn" onclick="window.api.maximize()">
        <svg width="12" height="12" viewBox="0 0 12 12"><rect x="2" y="2" width="8" height="8" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
      </button>
      <button id="btn-close" class="titlebar-btn btn-close" onclick="window.api.close()">
        <svg width="12" height="12" viewBox="0 0 12 12"><line x1="2" y1="2" x2="10" y2="10" stroke="currentColor" stroke-width="1.5"/><line x1="10" y1="2" x2="2" y2="10" stroke="currentColor" stroke-width="1.5"/></svg>
      </button>
    </div>
  </header>

  <!-- ═══ MAIN LAYOUT ═══ -->
  <div id="app-container">
    <!-- ── NAV SIDEBAR ── -->
    <nav id="nav-sidebar">
      <div class="nav-top">
        <button class="nav-btn active" data-module="dashboard" title="Dashboard">
          <i data-lucide="layout-dashboard" class="nav-icon"></i>
          <span class="nav-label">Dashboard</span>
        </button>
        <button class="nav-btn" data-module="editor" title="Editör">
          <i data-lucide="notebook-pen" class="nav-icon"></i>
          <span class="nav-label">Editör</span>
        </button>
        <button class="nav-btn" data-module="tasks" title="Görevler">
          <i data-lucide="list-checks" class="nav-icon"></i>
          <span class="nav-label">Görevler</span>
        </button>
        <button class="nav-btn" data-module="leads" title="Leads">
          <i data-lucide="trending-up" class="nav-icon"></i>
          <span class="nav-label">Leads</span>
        </button>
        <button class="nav-btn" data-module="customers" title="Müşteriler">
          <i data-lucide="users" class="nav-icon"></i>
          <span class="nav-label">Müşteriler</span>
        </button>
        <button class="nav-btn" data-module="reminders" title="Hatırlatıcılar">
          <i data-lucide="bell-ring" class="nav-icon"></i>
          <span class="nav-label">Hatırlatıcılar</span>
        </button>
        <button class="nav-btn" data-module="meetings" title="Toplantı Notları">
          <i data-lucide="calendar-days" class="nav-icon"></i>
          <span class="nav-label">Toplantılar</span>
        </button>
      </div>
      <div class="nav-bottom">
        <button class="nav-btn" id="btn-sidebar-pin" title="Menüyü Sabitle">
          <i data-lucide="panel-left" class="nav-icon"></i>
          <span class="nav-label">Sabitle</span>
        </button>
        <button class="nav-btn" data-module="files" title="Dosyalar">
          <i data-lucide="folder-open" class="nav-icon"></i>
          <span class="nav-label">Dosyalar</span>
        </button>
        <button class="nav-btn" id="btn-settings" data-module="settings" title="Ayarlar">
          <i data-lucide="settings" class="nav-icon"></i>
          <span class="nav-label">Ayarlar</span>
        </button>
      </div>
    </nav>

    <!-- ── FILE SIDEBAR ── -->
    <aside id="file-sidebar" class="panel-hidden">
      <div class="sidebar-header">
        <span data-i18n="files">Dosyalar</span>
        <button id="btn-open-folder" class="icon-btn" title="Klasör Aç">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        </button>
      </div>
      <div id="file-tree" class="file-tree"></div>
    </aside>

    <!-- ── CONTENT AREA ── -->
    <main id="content-area">
      <!-- ── DASHBOARD MODULE ── -->
      <section id="module-dashboard" class="module active">
        <div class="module-header">
          <h2>📊 Dashboard</h2>
        </div>
        <div id="dashboard-content" class="module-body"></div>
      </section>

      <!-- ── EDITOR MODULE (OneNote-style 3-panel) ── -->
      <section id="module-editor" class="module">
        <div class="editor-3panel">
          <!-- Panel 1: Notebooks -->
          <div class="panel-notebooks" id="panel-notebooks">
            <div class="panel-header">
              <span class="panel-title">📓 Defterler</span>
            </div>
            <div class="notebook-list" id="notebook-list"></div>
            <button class="btn-add-notebook" id="btn-add-notebook">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Yeni Defter
            </button>
          </div>

          <!-- Panel 2: Page List -->
          <div class="panel-pages" id="panel-pages">
            <div class="panel-header">
              <input type="text" id="page-search" class="page-search-input" placeholder="Not ara...">
              <button class="btn-add-page" id="btn-add-page" title="Yeni Sayfa">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              </button>
            </div>
            <div class="page-list" id="page-list"></div>
          </div>

          <!-- Panel 3: Editor -->
          <div class="panel-editor" id="panel-editor">
            <div id="tab-bar">
              <div id="tabs-container"></div>
              <button id="btn-new-tab" class="tab-add-btn" title="Yeni Sekme">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              </button>
              <button id="btn-new-note" class="tab-add-btn tab-note-btn" title="Yeni Not">
                📝
              </button>
            </div>
            <div id="note-meta-bar" class="note-meta-bar hidden"></div>
            <div id="editor-wrapper">
              <div id="editor-container"></div>
              <div id="markdown-preview" class="panel-hidden">
                <div class="preview-header">
                  <span>Markdown Önizleme</span>
                  <button id="btn-close-preview" class="icon-btn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                  </button>
                </div>
                <div id="preview-content" class="preview-body"></div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- ── TASKS MODULE ── -->
      <section id="module-tasks" class="module">
        <div class="module-header" id="tasks-header">
          <h2 data-i18n="tasks">Görevlerim</h2>
          <div class="module-actions">
            <input type="text" id="task-search" class="input-sm" placeholder="Görev ara...">
            <select id="task-filter-customer" class="select-sm">
              <option value="all">Tüm Müşteriler</option>
            </select>
            <select id="task-filter-category" class="select-sm">
              <option value="all" data-i18n="all">Tümü</option>
            </select>
            <select id="task-filter-status" class="select-sm">
              <option value="all" data-i18n="all">Tümü</option>
              <option value="todo" data-i18n="todo">Yapılacak</option>
              <option value="in-progress" data-i18n="in_progress">Devam Ediyor</option>
              <option value="done" data-i18n="done">Tamamlandı</option>
            </select>
            <button id="btn-new-task" class="btn-primary">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              <span data-i18n="new_task">Yeni Görev</span>
            </button>
          </div>
        </div>
        <div id="tasks-list" class="tasks-list"></div>
        <div id="task-detail-container" class="task-detail-container hidden"></div>
      </section>

      <!-- ── LEADS MODULE ── -->
      <section id="module-leads" class="module">
        <div class="module-header">
          <h2 data-i18n="leads">Leads</h2>
          <div class="module-actions">
            <select id="lead-filter-status" class="select-sm">
              <option value="all" data-i18n="all">Tümü</option>
              <option value="new">Yeni</option>
              <option value="quoted">Teklif Verildi</option>
              <option value="pending">Beklemede</option>
              <option value="won">Kazanıldı</option>
              <option value="lost">Kaybedildi</option>
            </select>
            <button id="btn-new-lead" class="btn-primary">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              <span data-i18n="new_lead">Yeni Lead</span>
            </button>
          </div>
        </div>
        <div id="leads-list" class="leads-list"></div>
      </section>

      <!-- ── CUSTOMERS MODULE ── -->
      <section id="module-customers" class="module">
        <div class="module-header" id="customers-header">
          <h2 data-i18n="customers">Müşteriler</h2>
          <div class="module-actions">
            <input type="text" id="customer-search" class="input-sm" placeholder="Müşteri ara...">
            <button id="btn-new-customer" class="btn-primary">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              <span data-i18n="new_customer">Yeni Müşteri</span>
            </button>
          </div>
        </div>
        <div id="customers-grid" class="customers-grid"></div>
        <div id="customer-detail-container" class="customer-detail-container hidden"></div>
      </section>

      <!-- ── REMINDERS MODULE ── -->
      <section id="module-reminders" class="module">
        <div class="module-header">
          <h2 data-i18n="reminders">Hatırlatıcılar</h2>
          <div class="module-actions">
            <select id="reminder-filter" class="select-sm">
              <option value="active">Aktif</option>
              <option value="completed">Tamamlanan</option>
              <option value="overdue">Süresi Geçen</option>
              <option value="all" data-i18n="all">Tümü</option>
            </select>
            <button id="btn-new-reminder" class="btn-primary">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              <span data-i18n="new_reminder">Yeni Hatırlatıcı</span>
            </button>
          </div>
        </div>
        <div id="reminders-list" class="reminders-list"></div>
      </section>

      <!-- ══ MEETINGS MODULE ══ -->
      <section id="module-meetings" class="module">
        <div class="module-header">
          <h2>🤝 Toplantı Notları</h2>
          <div class="module-actions">
            <input type="text" id="meeting-search" class="input-sm" placeholder="Toplantı ara...">
            <button id="btn-new-meeting" class="btn-primary">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              <span>Yeni Toplantı Notu</span>
            </button>
          </div>
        </div>
        <div id="meetings-list" class="meetings-list"></div>
      </section>

      <!-- ── SETTINGS MODULE ── -->
      <section id="module-settings" class="module">
        <div class="module-header">
          <h2 data-i18n="settings">Ayarlar</h2>
        </div>
        <div class="settings-content">
          <div class="settings-group">
            <h3 data-i18n="appearance">Görünüm</h3>
            <div class="setting-item">
              <label data-i18n="theme">Tema</label>
              <div class="theme-toggle" id="theme-toggle">
                <button class="theme-btn active" data-theme="dark">🌙 Karanlık</button>
                <button class="theme-btn" data-theme="light">☀️ Aydınlık</button>
              </div>
            </div>
            <div class="setting-item">
              <label data-i18n="font_size">Font Boyutu</label>
              <div class="setting-control">
                <input type="range" id="font-size-slider" min="10" max="24" value="14">
                <span id="font-size-value">14px</span>
              </div>
            </div>
            <div class="setting-item">
              <label data-i18n="font_family">Font Ailesi</label>
              <select id="font-family-select" class="select-sm">
                <option value="'JetBrains Mono', monospace">JetBrains Mono</option>
                <option value="'Cascadia Code', monospace">Cascadia Code</option>
                <option value="'Fira Code', monospace">Fira Code</option>
                <option value="Consolas, monospace">Consolas</option>
                <option value="'Courier New', monospace">Courier New</option>
              </select>
            </div>
            <div class="setting-item">
              <label>Minimap</label>
              <label class="switch">
                <input type="checkbox" id="minimap-toggle" checked>
                <span class="switch-slider"></span>
              </label>
            </div>
          </div>
          <div class="settings-group">
            <h3 data-i18n="language">Dil</h3>
            <div class="setting-item">
              <label data-i18n="interface_language">Arayüz Dili</label>
              <select id="language-select" class="select-sm">
                <option value="tr">Türkçe</option>
                <option value="en">English</option>
              </select>
            </div>
          </div>
          <div class="settings-group">
            <h3 data-i18n="categories">Kategoriler</h3>
            <div id="categories-list" class="categories-list"></div>
            <div class="add-category-row">
              <input type="text" id="new-category-name" class="input-sm" placeholder="Kategori adı">
              <input type="color" id="new-category-color" value="#6c5ce7">
              <button id="btn-add-category" class="btn-secondary">Ekle</button>
            </div>
          </div>
          <div class="settings-group">
            <h3>Otomatik Kaydetme</h3>
            <div class="setting-item">
              <label>Otomatik Kaydetme</label>
              <label class="switch">
                <input type="checkbox" id="autosave-toggle" checked>
                <span class="switch-slider"></span>
              </label>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- ═══ STATUS BAR ═══ -->
  <footer id="statusbar">
    <div class="status-left">
      <span id="status-line-col">Ln 1, Col 1</span>
      <span class="status-sep">|</span>
      <span id="status-word-count">0 kelime</span>
    </div>
    <div class="status-right">
      <span id="status-customer-tag" class="status-tag hidden"></span>
      <span id="status-encoding">UTF-8</span>
      <span class="status-sep">|</span>
      <span id="status-language">Plain Text</span>
      <span class="status-sep">|</span>
      <span id="status-locale">TR</span>
    </div>
  </footer>

  <!-- ═══ MODAL OVERLAY ═══ -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal-container" class="modal-container"></div>
  </div>

  <!-- ═══ TOAST CONTAINER ═══ -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Scripts -->
  <script src="js/dataStore.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/tags.js"></script>
  <script src="js/editor.js"></script>
  <script src="js/tabs.js"></script>
  <script src="js/fileManager.js"></script>
  <script src="js/search.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/markdown.js"></script>
  <script src="js/notes.js"></script>
  <script src="js/tasks.js"></script>
  <script src="js/leads.js"></script>
  <script src="js/customers.js"></script>
  <script src="js/reminders.js"></script>
  <script src="js/meetings.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/shortcuts.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
